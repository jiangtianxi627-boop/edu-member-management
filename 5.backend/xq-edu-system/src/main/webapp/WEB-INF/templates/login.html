<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>教务管理系统</title>
  <meta name="renderer" content="webkit|ie-comp|ie-stand">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi"/>
  <meta http-equiv="Cache-Control" content="no-siteapp"/>

  <link rel="shortcut icon" href="/static/HTmoban/favicon.ico" type="image/x-icon"/>
  <link rel="stylesheet" href="/static/HTmoban/css/font.css">
  <link rel="stylesheet" href="/static/HTmoban/css/xadmin.css">
  <script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="/static/HTmoban/lib/layui/layui.js" charset="utf-8"></script>
  <script type="text/javascript" src="/static/HTmoban/js/xadmin.js"></script>

</head>
<body class="login-bg">

<div class="login layui-anim layui-anim-up">
  <div class="message">基于SSM框架开发的教务管理系统</div>
  <div id="darkbannerwrap"></div>

  <form class="layui-form">
    <span style="color: red;" id="error"></span>
    <input name="username" placeholder="用户名" type="text" lay-verify="required" class="layui-input">
    <hr class="hr15">
    <input name="password" lay-verify="required" placeholder="密码" type="password" class="layui-input">
    <div>
      <input name="syscode" placeholder="验证码" type="text" style="width: 150px;float: left;" lay-verify="required"
             class="layui-input"/>
      <img src="/createSystemCode" id="systemCode" onclick="changeCode();"
           style="float: left;cursor: pointer;"/></span>
    </div>
    <hr class="hr15">
    <input value="登录" lay-submit lay-filter="login" style="width:100%;" type="button" onclick="userLogin();"/>
    <hr class="hr20">
  </form>
</div>

<script type="text/javascript">
  if (window.top !== window.self) {
    window.top.location = window.location
  }
  // 基于ajax发送异步认证请求
  function userLogin(){
    // 获取用户名和密码
    var username = $("[name='username']").val();
    var password = $("[name='password']").val();
    var syscode = $("[name='syscode']").val();

    $.post("/login",{"username": username,"password": password,"syscode":syscode},function(res){
       if(res.code == 200){
         location.href = "/index.html";
       }else if(res.code == 9002){
         $("#error").text(res.msg);
       }else if(res.code == 9001){
         $("#error").text(res.msg);
       }else{
         $("#error").text("登录异常!");
       }
    },"json")
  }

  function changeCode(){
    $("#systemCode").prop("src","/createSystemCode?date=" + new Date())
  }

</script>

<!-- 底部结束 -->

       target="_blank">互联网XXXXX号-1</a>
  </div>
</div>
</body>
