<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>修改密码</title>
    <meta name="renderer" content="webkit|ie-comp|ie-stand">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi"/>
    <meta http-equiv="Cache-Control" content="no-siteapp"/>

    <link rel="shortcut icon" href="/static/HTmoban/favicon.ico" type="image/x-icon"/>
    <link rel="stylesheet" href="/static/HTmoban/css/font.css">
    <link rel="stylesheet" href="/static/HTmoban/css/updxadmin.css">
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="/static/HTmoban/lib/layui/layui.js" charset="utf-8"></script>
    <script type="text/javascript" src="/static/HTmoban/js/xadmin.js"></script>

    <script type="text/javascript" src="/static/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="/static/bootstrap/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/static/table/bootstrap-table.js"></script>
    <script type="text/javascript" src="/static/table/locale/bootstrap-table-zh-CN.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/static/sweetalert/sweetalert.css"/>
    <script type="text/javascript" src="/static/sweetalert/sweetalert.min.js"></script>
    <script src="/static//bootstrap/js/tableExport.js"></script>
    <link rel="stylesheet" href="/static/date/bootstrap-datetimepicker.min.css"/>
    <script type="text/javascript" src="/static/date/Moment.js"></script>
    <script type="text/javascript" src="/static/date/bootstrap-datetimepicker.min.js"></script>

</head>
<body class="login-bg">

<div class="login layui-anim layui-anim-up">
    <div class="message">修改密码</div>
    <div id="darkbannerwrap"></div>

    <form class="layui-form">
        <span style="color: red;" id="error"></span>
        <input name="oldPassword" placeholder="原密码" type="password" lay-verify="required" class="layui-input">
        <hr class="hr15">
        <input name="newPassword" lay-verify="required" placeholder="新密码" type="password" class="layui-input">
        <hr class="hr15">
        <input name="newPasswordAgain" placeholder="再次输入新密码" type="password" lay-verify="required" class="layui-input">
        <hr class="hr15">
        <input value="确认修改" onclick="updatePwd()" lay-submit lay-filter="login" style="width:100%;" type="button">
        <hr class="hr20">
    </form>

</div>
<script>

    //更新密码
    function updatePwd() {
        var oldPassword = $("[name='oldPassword']").val();
        var newPassword = $("[name='newPassword']").val();
        var newPasswordAgain = $("[name='newPasswordAgain']").val();
        $.post("/adminuser/updatePwd", {
            "oldPassword": oldPassword,
            "newPassword": newPassword,
            "newPasswordAgain": newPasswordAgain
        }, function (result) {
            if (result.code == 200) {
                swal({
                        title: "修改密码",
                        text: "密码修改成功,重新登录！",
                        type: "success",
                        showCancelButton: true,
                        confirmButtonColor: "#DD6B55",
                        confirmButtonText: "确定",
                        closeOnConfirm: false,
                        closeOnCancel: false
                    },
                    function (isConfirm) {
                        if (isConfirm) {
                            parent.location.href = "/login.html";
                        }
                    });
            } else {
                $("#error").text(result.msg);
            }
        }, "json");
    }

</script>


</body>
</html>
