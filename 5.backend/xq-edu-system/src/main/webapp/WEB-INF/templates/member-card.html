<script src="/static/jquery-3.2.1.min.js">
    window.onunload(alert("jin"))
</script>
<html>
<head>
    <title>会员续卡</title>
    <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.css" />
    <link rel="stylesheet" href="/static/table/bootstrap-table.min.css" />
    <script type="text/javascript" src="/static/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="/static/bootstrap/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/static/table/bootstrap-table.js"></script>
    <script type="text/javascript" src="/static/table/locale/bootstrap-table-zh-CN.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/static/sweetalert/sweetalert.css" />
    <script type="text/javascript" src="/static/sweetalert/sweetalert.min.js"></script>

    <link rel="stylesheet" href="/static/date/bootstrap-datetimepicker.min.css" />
    <script type="text/javascript" src="/static/date/Moment.js"></script>
    <script type="text/javascript" src="/static/date/bootstrap-datetimepicker.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.12.4/css/bootstrap-select.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.12.4/js/bootstrap-select.min.js"></script>

    <script>
        $(function () {

            //异步加载卡类型下拉框
            $.getJSON("/membertype/list",{},function (releset) {
                var e=releset.data;
                $(e).each(function () {
                    $('#ktype').append('<option value='+this.typeId+' >'+this.typeName+'</option>');
                })
            });

            $('#srdata').datetimepicker({
                //viewMode: 'day',
                format: 'MM-DD'
            });
            $('#dg').bootstrapTable({
                url:'/memberExtendCard/queryPage',
                method:'get',
                contentType:"application/x-www-form-urlencoded",
                columns:[
                    { field:'memberId',title:'会员编号',sortable: true},
                    { field:'memberName',title:'名称',sortable: true},
                    { field:'memberPhone',title:'电话',sortable: true},
                    { field:'membertype.typeName',title:'卡类型'},
                    { field:'nenberDate',title:'录入日期'},
                    { field:'xxx',title:'会员状态',
                        formatter:function (value,row,index) {
                            if(row.memberStatic==1){
                                return "正常"
                            }else{
                                return "<p style='color:red'>请续卡</p>"
                            }
                        }
                    },
                    { field:'memberxufei',title:'到期日期'},
                    { field:'xxx',title:'操作',
                        formatter:function (value,row,index) {
                            return "<a title='续卡' href='javascript:xufei(" + row.memberId + ")'><span class='glyphicon glyphicon-arrow-right'>续卡</span></a>";
                        }
                    },
                ],
                queryParamsType:'',
                queryParams:queryParams,
                height:360,
                pageList:[5,10,15],
                pageNumber:1,
                pageSize:5,
                pagination:true,
                sidePagination:'server',
                onDblClickRow:function(row,$element,field) {

                }
            })
        });

        //获取当前的条件个页面页数即使更新值
        function queryParams(afds){
            var i={
                "pageSize":afds.pageSize,
                "pageNumber":afds.pageNumber,
                "id":$('#hyid').val(),
                "ktype":$('#ktype').val()

            };
            return i;
        }

        //查询
        function search(){
            var opt=$('#dg').bootstrapTable('getOptions');
            var hyid=$('#hyid').val();
            var ktype=$('#ktype').val();
            $.getJSON("/memberExtendCard/queryPage",{"pageSize":opt.pageSize,"pageNumber":opt.pageNumber,"hyname":hyid,"ktype":ktype},function (releset) {
                $("#dg").bootstrapTable('load',releset) ;
            })
        }

        //弹框
        function xufei(id) {
            //下拉框清空
            $('#xztype').empty();

            $.getJSON("/membertype/list",{},function (releset) {
                var e=releset.data;
                var tt ="";
                var tttt="";
                var ttt="<option value='-1'>"+"--请选择--"+"</option>";
                $(e).each(function () {
                    tt += "<option value='"+this.typeId+"'>"+""+this.typeName+"</option>";
                    tttt=ttt+tt;
                    $('#xztype').html(tttt);
                })

            });
            //隐藏ID值
            $('#ycy').val(id);
            //显示模态框
            $('#updateeModal').modal('show');
        }


        //续卡
        function cz() {
            if(!validateAdd()){
                return;
            }
            var id=$('#ycy').val();
            var xztype=$('#xztype').val();
            var jine=$('#xzmoney').val();

            $.getJSON("/member/queryById/"+id,{},function (releset) {
                //到期时间
                var memberxufei = releset.data.memberxufei;
                //账户余额
                var memberbalance = releset.data.memberbalance;
                $.getJSON("/membertype/getDays/"+xztype,{},function (releset) {
                    //续费天数
                    var typetian=releset.data.typeDay;
                    //会员卡金额
                    var typemoney=releset.data.typemoney;
                    if (typemoney>memberbalance){
                        swal(
                            {
                                title:"余额不足！",
                                type:"warning",
                                timer: 1500,
                                showConfirmButton: false
                            }
                        );
                        return;
                    }
                    var date1 = new Date();
                    var date2 = new Date(date1);

                    var date3 = new Date(memberxufei);
                    var date4 = new Date(memberxufei);

                    if(date1.getTime()>= date3.getTime()){
                        var qb=date2.setDate(date1.getDate() + typetian);
                        var rq=date2.getFullYear() + "-" + (date2.getMonth() + 1) + "-" + date2.getDate();
                    }else {
                        var qb=date4.setDate(date3.getDate() + typetian);
                        var rq=date4.getFullYear() + "-" + (date4.getMonth() + 1) + "-" + date4.getDate();
                    }

                    var bz=$('#bz').val();

                    $.post("/cardsrecord/extendCard",{"remark":bz,"memberId":id,"typeId":xztype,"money":jine,"daoqi":rq},function (releset) {
                        if(releset.code==200){
                            $("#dg").bootstrapTable('load',releset) ;
                            $('#updateeModal').modal('hide');
                            swal(
                                {
                                    title:"续卡成功",
                                    type:"success",
                                    timer: 1500,
                                    showConfirmButton: false
                                }
                            );
                            search();
                        }else{
                            swal(
                                {
                                    title:"续卡失败",
                                    type:"warning",
                                    timer: 1500,
                                    showConfirmButton: false
                                }
                            )
                        }
                    })
                })
            })
        }

        function validateAdd() {
            $("#xztype").parent().find("span").remove();
            $("#ssmoney").parent().find("span").remove();

            var xztype = $("#xztype").val().trim();
            if(xztype==-1){
                $("#xztype").parent().append("<span style='color:red'>请选择会员卡型</span>");
                return false;
            }
            return true;
        }

        //会员卡下拉框框选中，加载会员卡金额
        function sss() {
            //获取下拉ID值
            var xztype=$('#xztype').val();
            if(xztype!=0){
                $.getJSON("/membertype/queryById/"+xztype,{},function (releset) {
                    $('#xzmoney').val(releset.data.typemoney);
                });
            }
        }


        function zql() {
            var jine=$('#xzmoney').val();
            var ssjine=$('#ssmoney').val();
            var zhao=ssjine-jine;
            $('#zhaoqian').val(zhao);
        }
    </script>
</head>
<body background="/static/HTmoban/images/tongji4.jpg">

<div class="panel panel-default">
    <div class="panel-body">
        <form class="form-inline">
            <div  class="input-group input-daterange">
                <label for="hyid" class="control-label">姓名:</label>
                <input id="hyid" type="text" class="form-control">
            </div>
            <div  class="input-group input-daterange">
                <label for="ktype" class="control-label">卡型:</label>
                <select class="form-control" id="ktype">
                    <option value="0">请选择</option>
                </select>
            </div>
            <button onclick="search()" type="button" class="btn btn-default" style="margin-top: 20px" >查询</button>
        </form>
    </div>

</div>

<div>
    <table id="dg"></table>
</div>

<div class="modal fade" id="updateeModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="updateModalLabel">选择续卡类型</h4>
            </div>
            <div class="modal-body">
                <form>
                    <div>
                        <label for="xztype" class="control-label">卡型:</label>
                        <select class="form-control" id="xztype" oninput="sss()">

                        </select>
                    </div>
                    <div>
                        <label for="xzmoney" class="control-label">金额:</label>
                        <input class="form-control" type="text" id="xzmoney" readonly="readonly" >
                    </div>
                    <div>
                        <label for="bz" class="control-label">备注:</label>
                        <input class="form-control" type="text" id="bz">
                    </div>
                    <input type="hidden" id="ycy">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="cz()">会员续卡</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
