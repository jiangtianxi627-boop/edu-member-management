<html lang="en">
<head>
    <title>商品列表</title>
    <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.css" />
    <link rel="stylesheet" href="/static/table/bootstrap-table.min.css" />
    <script type="text/javascript" src="/static/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="/static/bootstrap/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/static/table/bootstrap-table.js"></script>
    <script type="text/javascript" src="/static/table/locale/bootstrap-table-zh-CN.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/static/sweetalert/sweetalert.css" />
    <script type="text/javascript" src="/static/sweetalert/sweetalert.min.js"></script>

    <link rel="stylesheet" href="/static/date/bootstrap-datetimepicker.min.css" />
    <script type="text/javascript" src="/static/date/Moment.js"></script>
    <script type="text/javascript" src="/static/date/bootstrap-datetimepicker.min.js"></script>

    <script>
        $(function () {
            $('#table').bootstrapTable({
                url:'/goods/queryPage',
                method:'get',
                contentType:"application/x-www-form-urlencoded",
                columns:[{ checkbox:true
                }, {
                    field: 'goodsId',
                    title: '商品编号'
                },{
                    field: 'goodsName',
                    title: '商品名称'
                },{
                    field: 'unitPrice',
                    title: '进价'
                },{
                    field: 'sellPrice',
                    title: '售价',
                },
                    { field:'xxx',title:'库存',
                        formatter:function (value,row,index) {
                            if(row.inventory==0){
                                return "<p style='color:red'>请进货</p>"
                            }else if(row.inventory<10){
                                return "<p style='color:red'>货物不足10个</p>";
                            }else{
                                return row.inventory;
                            }
                        }
                    },
                    {
                        field: 'remark',
                        title: '备注',
                    }, {
                        field:'xx',title:'操作',/*visible:[[${session.isAdmin}]],*/
                        formatter : function(value, row, index) {
                            return "<a title='删除' href='javascript:del1("+ row.goodsId + ")'>" +
                                "<span class='glyphicon glyphicon-trash'></span></a>  | " +
                                "<a href='javascript:toupd("+row.goodsId+")'> " +
                                "<span class='glyphicon glyphicon-pencil'></span></a> | " +
                                "<a href='javascript:upd1("+row.goodsId+")' class='glyphicon glyphicon-pencil'>进货</a> | " +
                                "<a href='javascript:upd3("+row.goodsId+")' class='glyphicon glyphicon-pencil'>退货</a>";
                        }

                    }
                ],
                queryParamsType:'',
                queryParams:queryParams,
                height:360,
                pageList:[5,10,15],
                pageNumber:1,
                pageSize:5,
                pagination:true,
                sidePagination:'server'
            })
        });

        //打开模态框
        function toupd(id) {
            $('#myModal3').modal("show");
            $.getJSON('/goods/queryById/'+id,{},function(result){
                var data=result.data;
                $("#table").bootstrapTable("load",data) ;
                $("#mc").val(data.goodsName);
                $("#jj").val(data.unitPrice);
                $("#sj").val(data.sellPrice);
                $('#dw').val(data.unit);
                $('#bz').val(data.remark);
                $('#did').val(data.goodsId);
                $('#spsl').val(data.inventory);
            }) ;
        }

        //删除
        function del1(id){
            swal({
                    title: "确定删除吗？",
                    text: "您将无法恢复！",
                    type: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#DD6B55",
                    confirmButtonText: "确定删除！",
                    cancelButtonText: "取消删除！",
                    closeOnConfirm: false,
                    closeOnCancel: false
                },
                function (isConfirm) {
                    if (isConfirm) {
                        //var opt=$('#table').bootstrapTable('getOptions');
                        var goodsid=$('#goodsid').val();
                        $.post('/goods/delete/'+id,{'_method':'delete'},function(res){
                            if(res.code==200){
                                //重新给table绑定数据
                                //$("#table").bootstrapTable("load",res.data) ;
                                swal("删除！", "删除成功！", "success");
                            }else{
                                swal("删除！", "删除异常！", "error");
                            }
                            search();
                        }) ;

                    } else {
                        swal("取消！", "您已取消删除)", "error");
                    }
                });
        }

        //获取当前的条件个页面页数即使更新值
        function queryParams(afds){
            var i={
                "pageSize":afds.pageSize,
                "pageNumber":afds.pageNumber,
                "goodsName":$('#goodsid').val(),
            };
            return i;
        }

        //查询
        function search(){
            var opt=$('#table').bootstrapTable('getOptions');
            var goodsid=$('#goodsid').val();
            $.getJSON("/goods/queryPage",{"pageSize":opt.pageSize,"pageNumber":1,"goodsName":goodsid},function (releset) {
                $("#table").bootstrapTable('load',releset) ;
            })
        }


        function save(){
            if(!validateAdd()){
                return;
            }
            //接收数据
            var opt=$('#table').bootstrapTable('getOptions');
            var goodsid=$('#goodsid').val();
            var name=$("#name").val();
            var unit = $("#unit").val();
            var count = $("#count").val();
            var unitprice = $("#unitprice").val();
            var sellprice= $("#sellprice").val();
            var remark = $('#remark').val();
            $("#myModal").modal("hide");
            $.getJSON("/goods/goodsNameExist",{"goodsName":name},function (releset) {
                //$("#table").bootstrapTable('load',releset) ;
                if(releset.data<1){
                    $.post('/goods/add',{'goodsName':name,'unit':unit,'unitPrice':unitprice,'sellPrice':sellprice,'inventory':count,"remark":remark},function(res){
                        //alert(res);  // {"code":403,"msg":"??????"}
                        //res=JSON.parse(res);
                        if(res.code==200){
                            //重新给table绑定数据
                            //$("#table").bootstrapTable("load",res.data) ;
                            swal("新增！", "新增成功！", "success");
                        }else if(res.code==403){
                            swal("新增！", "没有权限访问！", "error");
                        }else{
                            swal("新增！", "新增异常！", "error");
                        }
                        search();
                    },"json") ;
                }else if(releset>0){
                    swal("失败！", "已有该商品，请重新输入！", "error");
                    search();
                }
            })
        }

        function validateAdd() {
            $("#name").parent().find("span").remove();
            $("#unit").parent().find("span").remove();
            $("#unitprice").parent().find("span").remove();
            $("#sellprice").parent().find("span").remove();
            $("#count").parent().find("span").remove();

            var name = $("#name").val().trim();
            if(name == null || name == ""){
                $("#name").parent().append("<span style='color:red'>请填写商品名称</span>");
                return false;
            }

            var unit = $("#unit").val().trim();
            if(unit == -1){
                $("#unit").parent().append("<span style='color:red'>请选择商品单位</span>");
                return false;
            }


            var unitprice = $("#unitprice").val().trim();
            if(unitprice == null || unitprice == ""){
                $("#unitprice").parent().append("<span style='color:red'>请填写商品进价</span>");
                return false;
            }

            if(!(/^[0-9,.]*$/.test(unitprice))){
                $("#unitprice").parent().append("<span style='color:red'>商品进价只能为正整数或小数</span>");
                return false;
            }

            var sellprice = $("#sellprice").val().trim();
            if(sellprice == null || sellprice == ""){
                $("#sellprice").parent().append("<span style='color:red'>请填写商品售价</span>");
                return false;
            }

            if(!(/^[0-9,.]*$/.test(sellprice))){
                $("#sellprice").parent().append("<span style='color:red'>商品售价只能为正整数或小数</span>");
                return false;
            }



            var count = $("#count").val().trim();
            if(count == null || count == ""){
                $("#count").parent().append("<span style='color:red'>请填写商品数量</span>");
                return false;
            }

            if(!(/^[0-9]\d*$/.test(count))){
                $("#count").parent().append("<span style='color:red'>商品数量只能为正整数和0</span>");
                return false;
            }
            return true;
        }


        //进货
        function upd1(id){
            $("#myModal2").modal("show");
            $('#tuihuo').hide();
            $('#jin').show();
            $('#th').text("进货数量");
            $('#myModalLabel2').text("商品进货");
            $('#id').val(id);

            $('#jinhuo').val();

            $.getJSON('/goods/queryById/'+id,{},function(res){
                var data=res.data;
                $("#table").bootstrapTable("load",data) ;
                $("#xgname").val(data.goodsName);
                $("#xgcount").val(data.inventory);
            }) ;

        }


        function update() {
            if(!validateUpd()){
                return;
            }
            var opt=$('#table').bootstrapTable('getOptions');
            var goodsid=$('#goodsid').val();
            var name=$("#mc").val();
            var unit = $("#dw").val();
            var unitprice = $("#jj").val();
            var sellprice= $("#sj").val();
            var remark = $('#bz').val();
            var id = $('#did').val();
            var count = $('#spsl').val();
            $("#myModal3").modal("hide") ;
            $.post('/goods/update',{'_method':'put','goodsId':id,'goodsName':name,"unit":unit,"unitPrice":unitprice,"sellPrice":sellprice,"inventory":count,"remark":remark},function(res){
                if(res.code==200){
                    //重新给table绑定数据
                    //$("#table").bootstrapTable("load",res.data) ;
                    swal("更新！", "更新成功！", "success");
                }else{
                    swal("更新！", "更新异常！", "error");
                }
                search();
            }) ;
        }

        function validateUpd() {
            $("#mc").parent().find("span").remove();
            $("#dw").parent().find("span").remove();
            $("#jj").parent().find("span").remove();
            $("#sj").parent().find("span").remove();
            $("#spsl").parent().find("span").remove();


            var mc = $("#mc").val().trim();
            if(mc == null || mc == ""){
                $("#mc").parent().append("<span style='color:red'>请填写商品名称</span>");
                return false;
            }

            var dw = $("#dw").val().trim();
            if(dw == -1){
                $("#dw").parent().append("<span style='color:red'>请选择商品单位</span>");
                return false;
            }


            var jj = $("#jj").val().trim();
            if(jj == null || jj == ""){
                $("#jj").parent().append("<span style='color:red'>请填写商品进价</span>");
                return false;
            }

            if(!(/^[0-9,.]*$/.test(jj))){
                $("#jj").parent().append("<span style='color:red'>商品进价只能为正整数或小数</span>");
                return false;
            }

            var sj = $("#sj").val().trim();
            if(sj == null || sj == ""){
                $("#sj").parent().append("<span style='color:red'>请填写商品售价</span>");
                return false;
            }

            if(!(/^[0-9,.]*$/.test(sj))){
                $("#sj").parent().append("<span style='color:red'>商品售价只能为正整数或小数</span>");
                return false;
            }

            var spsl = $("#spsl").val().trim();
            if(spsl == null || spsl == ""){
                $("#spsl").parent().append("<span style='color:red'>请填写商品数量</span>");
                return false;
            }

            if(!(/^[0-9]\d*$/.test(spsl))){
                $("#spsl").parent().append("<span style='color:red'>商品数量只能为正整数和0</span>");
                return false;
            }

            return true;
        }


        //------------------------------------------------------------------------------------------------
        function upd3(id){
            $("#myModal2").modal("show");
            $('#jin').hide();
            $('#id').val(id);
            $('#myModalLabel2').text("商品退货");
            $('#th').text("退货数量");
            $('#tuihuo').val();

            $('#tuihuo').show();

            $.getJSON('/goods/queryById/'+id,{},function(res){
                var data=res.data;
                $("#table").bootstrapTable("load",data) ;
                $("#xgname").val(data.goodsName);
                $("#xgcount").val(data.inventory);
            }) ;

        }

        //进货
        function upd(){
            if(!validateUpd1()){
                return;
            }
            var opt=$('#table').bootstrapTable('getOptions');
            var goodsid=$('#goodsid').val();
            var id =  $('#id').val();
            var inventory=parseInt($("#xgcount").val());
            var jinhuo = parseInt($('#jinhuo').val());
            var ss  = parseInt((inventory +jinhuo));
            $("#myModal2").modal("hide") ;
            $.post('/goods/update',{'_method':'put','goodsId':id,"inventory":ss},function(res){
                if(res.code==200){
                    swal("进货！", "进货成功！", "success");
                }else{
                    swal("进货！", "进货异常！", "error");
                }
                search();
            }) ;
        }

        function validateUpd1() {
            $("#jinhuo").parent().find("span").remove();

            var jinhuo = $("#jinhuo").val().trim();
            if(jinhuo == null || jinhuo == ""){
                $("#jinhuo").parent().append("<span style='color:red'>请填写数量</span>");
                return false;
            }

            if(!(/^[0-9]\d*$/.test(jinhuo))){
                $("#jinhuo").parent().append("<span style='color:red'>数量只能为正整数和0</span>");
                return false;
            }

            return true;
        }

        function ss() {
            $("#name").val("");
            $("#unit").val("-1");
            $("#count").val("");
            $("#unitprice").val("");
            $("#sellprice").val("");
            $("#remark").val("");
        }

        function upd2(){
            if(!validateUpd1()){
                return;
            }
            var opt=$('#table').bootstrapTable('getOptions');
            var goodsid=$('#goodsid').val();
            var id =  $('#id').val();
            var inventory=parseInt($("#xgcount").val());
            var jinhuo = parseInt($('#jinhuo').val());
            var ss  = parseInt((inventory -jinhuo));
            $("#myModal2").modal("hide") ;
            if(inventory<jinhuo){
                swal("失败！", "库存不足，退货失败", "error");
                search();
            }else{
                $.post('/goods/update',{'_method':'put','goodsId':id,"inventory":ss},function(res){
                    if(res.code==200){
                        swal("退货！", "退货成功！", "success");
                    }else{
                        swal("退货！", "退货异常！", "error");
                    }
                    search();
                }) ;
            }

        }
    </script>
</head>

                        <label for="remark" class="col-sm-4 control-label"style="margin-top: 10px">备注</label>

                    </div>
                </form>
                &nbsp;
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                    <button onclick="save()" id = "add" type="button" class="btn btn-primary">提交</button>
                </div>
            </div>
        </div>
    </div>
</div>

    <div class="modal-dialog" role="document">
        <div class="modal-content">

                <button type="button" class="close" data-dismiss="modal"

            <div class="modal-body">
                <!-- form开始 -->
                <form>

                        <label for="xgname" class="col-sm-4 control-label"style="margin-top: 10px">商品名称</label>
                        <div class="col-sm-8">
                            <input type="text"style="margin-top: 10px" class="form-control" readonly id="xgname" parsley-trigger="change" parsley-required="true" parsley-minlength="4" parsley-type="email" parsley-validation-minlength="1">
