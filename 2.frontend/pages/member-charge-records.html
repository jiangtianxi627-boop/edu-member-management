    window.onunload(alert("jin"))
</script>
<html>
<head>
    <title>会员充值记录列表</title>
    <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.css" />
    <link rel="stylesheet" href="/static/table/bootstrap-table.min.css" />
    <script type="text/javascript" src="/static/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="/static/bootstrap/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/static/table/bootstrap-table.js"></script>
    <script type="text/javascript" src="/static/table/locale/bootstrap-table-zh-CN.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/static/sweetalert/sweetalert.css" />
    <script type="text/javascript" src="/static/sweetalert/sweetalert.min.js"></script>
    <script src="/static//bootstrap/js/tableExport.js"></script>
    <link rel="stylesheet" href="/static/date/bootstrap-datetimepicker.min.css" />
    <script type="text/javascript" src="/static/date/Moment.js"></script>
    <script type="text/javascript" src="/static/date/bootstrap-datetimepicker.min.js"></script>

    <script>
        $(function () {
            $('#xdate').datetimepicker({
                //viewMode: 'day',
                format: 'YYYY-MM-DD'
            });
            $('#ddate').datetimepicker({
                format: 'YYYY-MM-DD',
                useCurrent: false //Important! See issue #1075
            });
            $("#xdate").on("dp.change", function (e) {
                $('#secondDate').data("DateTimePicker").minDate(e.date);
            });
            $("#ddate").on("dp.change", function (e) {
                $('#firstDate').data("DateTimePicker").maxDate(e.date);
            });
            $('#dg').bootstrapTable({
                url:'/chargerecords/queryPage',
                method:'get',
                contentType:"application/x-www-form-urlencoded",
                columns:[
                    { field:'member.memberId',title:'会员编号'},
                    { field:'member.memberName',title:'会员名称'},
                    { field:'member.membertype.typeName',title:'会员类型'},
                    { field:'money',title:'充值金额'},
                    { field:'remark',title:'充值备注'},
                    { field:'chargetime',title:'充值日期'}
                ],
                queryParamsType:'',
                queryParams:queryParams,
                height:360,
                pageList:[5,10,15],
                pageNumber:1,
                pageSize:5,
                pagination:true,
                sidePagination:'server',
            })
        });

        //获取当前的条件个页面页数即使更新值
        function queryParams(afds){
            var i={
                "pageSize":afds.pageSize,
                "pageNumber":afds.pageNumber,
                "xdate":$('#xdate').val(),
                "ddate":$('#ddate').val(),
            };
            return i;
        }
        //查询
        function search(){
            var opt=$('#dg').bootstrapTable('getOptions');
            var xdate=$('#xdate').val();
            var ddate=$('#ddate').val();
            $.getJSON("/chargerecords/queryPage",{"pageSize":opt.pageSize,"pageNumber":opt.pageNumber,"xdate":xdate,"ddate":ddate},function (releset) {
                $("#dg").bootstrapTable('load',releset) ;
            })
        }
    </script>
</head>
<body background="/static/HTmoban/images/tongji4.jpg">

<div class="panel panel-default">
    <div class="panel-body">
        <form class="form-inline">
            <div  class="input-group input-daterange">
                <label for="xdate" class="control-label">日期从:</label>
                <input id="xdate" type="text" class="form-control">
            </div>
            <div  class="input-group input-daterange">
                <label for="ddate" class="control-label">到:</label>
                <input id="ddate" type="text" class="form-control">
            </div>
            <button onclick="search()" type="button" class="btn btn-default" style="margin-top: 20px" >查询</button>
            <button type="button" id="download" style="margin-left:20px;" class="btn btn-primary" onClick ="$('#dg').tableExport({ type: 'excel', escape: 'false' })">数据导出</button>
        </form>
    </div>

</div>

<div>
    <table id="dg"></table>
</div>
</body>
</html>
